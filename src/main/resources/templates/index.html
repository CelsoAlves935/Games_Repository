<!DOCTYPE html>
<html xmlsn:th="http://www.thymeleaf.org">
    <head>
        <meta chartset="UTF-8">
        <title>
            Minha Estante de Jogos
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
    </head>
    <body>
        <h1>🎮 Bem-Vindo à GameLibrary</h1>
        
        <table class="table table-striped table-hover">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Plataforma</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="game : ${jogos}">
                    <td th:text="${game.id}">1</td>
                    <td th:text="${game.titulo}">Nome do jogo</td>
                    <td th:text="${game.plataforma}">Console</td>
                    <td th:text="${game.zerado ? 'Zerado ✅' : 'Jogando 🕹️'}">Status</td>
                </tr>
            </tbody>
        </table>

        <ul>
            <li th:each = "game : ${jogos}" th:text="${game.titulo}">
                Título do Jogo (Será substituido)
            </li>
        </ul>
    </body>
</html>
