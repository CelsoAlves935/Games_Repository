<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>
        Minha Estante de Jogos
    </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <div class="container mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🎮 Minha Biblioteca</h1>
            <a th:href="@{/novo}" class="btn btn-primary">Novo Jogo</a>
        </div>

        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4">

            <div class="col" th:each="game : ${jogos}">
                <div class="card h-100 shadow-sm border-0 bg-light">
                    <div class="card-body">
                        <h5 class="card-title fw-bold" th:text="${game.titulo}">Título</h5>
                        <p class="card-text text-muted mb-2">
                            <small th:text="${game.plataforma}">Plataforma</small>
                        </p>

                        <span class="badge rounded-pill"
                            th:classappend="${game.zerado} ? 'bg-success' : 'bg-warning text-dark'"
                            th:text="${game.zerado ? 'Zerado ✅' : 'Jogando 🕹️'}">
                        </span>
                    </div>

                    <div class="card-footer bg-transparent border-0 pb-3">
                        <div class="btn-group w-100">
                            <button class="btn btn-outline-secondary btn-sm">Editar</button>
                            <button class="btn btn-outline-danger btn-sm">Excluir</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
