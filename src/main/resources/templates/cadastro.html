<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Cadastrar Jogo</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" >
    </head>
    <body class="container mt-5">
        <h1>Novo Jogo 🎮</h1>

        <form th:action="@{/salvar}" th:object="${game}" method="post" class="mt-4">
            <div class="mb-3">
                <label class="form-label">Título:</label>
                <input type="text" th:field="*{titulo}" class="form-control" placeholder="Ex: Elden Ring" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Plataforma</label>
                <input type="text" th:field="*{plataforma}" class="form-control" placeholder="Ex: PC / PS6">
            </div>

            <!-- <div class="mb-3">
                <label class="form-label">Zerado</label>
                <input type="text" th:field="*{zerado}" class="form-control" placeholder="Ex:Sim ou não">
            </div> -->

            <button type="submit" class="btn btn-success">Salvar jogo</button>
            <a href="/" class="btn btn-secondary">Cancelar</a>
        </form>
    </body>
</html>
